name: Android CI (Cryo-Songbook)

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [mobileOnly, withWear]

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x opensong_tablet/gradlew

    - name: Extract Project Version
      id: get_version
      run: |
        VERSION=$(grep "versionName =" opensong_tablet/app/build.gradle | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/' | sed -E "s/.*'([^']+)'.*/\1/")
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Project Version: $VERSION"

    - name: Remove local java.home for CI
      run: |
        if [ -f opensong_tablet/gradle.properties ]; then
          sed -i '/org.gradle.java.home/d' opensong_tablet/gradle.properties
        fi

    - name: Build Debug APK
      run: cd opensong_tablet && ./gradlew assemble${{ matrix.flavor }}Debug --no-daemon

    - name: Decode Keystore (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        MYAPP_STORE_FILE_BASE64: ${{ secrets.MYAPP_STORE_FILE_BASE64 }}
      run: |
        echo "--- Keystore decode diagnostic ---"
        if [ -z "$MYAPP_STORE_FILE_BASE64" ]; then
          echo "⚠️ MYAPP_STORE_FILE_BASE64 secret is EMPTY — release will be unsigned"
        else
          CHAR_COUNT=$(echo -n "$MYAPP_STORE_FILE_BASE64" | wc -c | tr -d ' ')
          echo "✅ Secret has $CHAR_COUNT chars"
          echo "$MYAPP_STORE_FILE_BASE64" | base64 -d > opensong_tablet/app/release-keystore.jks
          FILESIZE=$(wc -c < opensong_tablet/app/release-keystore.jks | tr -d ' ')
          echo "✅ Decoded keystore: $FILESIZE bytes"
          # Verify it's a valid JKS
          file opensong_tablet/app/release-keystore.jks
        fi

    - name: Build Release APK (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        MYAPP_STORE_FILE_BASE64: ${{ secrets.MYAPP_STORE_FILE_BASE64 }}
        MYAPP_STORE_PASSWORD: ${{ secrets.MYAPP_STORE_PASSWORD }}
        MYAPP_KEY_ALIAS: ${{ secrets.MYAPP_KEY_ALIAS }}
        MYAPP_KEY_PASSWORD: ${{ secrets.MYAPP_KEY_PASSWORD }}
      run: |
        cd opensong_tablet
        ./gradlew assemble${{ matrix.flavor }}Release --no-daemon --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/build_log_${{ matrix.flavor }}.txt"

    - name: Prepare Artifacts
      if: always()
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        FLAVOR=${{ matrix.flavor }}
        
        mkdir -p artifacts_out
        
        # Move Debug
        DEBUG_APK=$(find opensong_tablet/app/build/outputs/apk/$FLAVOR/debug -name "*.apk" 2>/dev/null | head -n 1)
        if [ -f "$DEBUG_APK" ]; then
          cp "$DEBUG_APK" "artifacts_out/CryoSongbook-v$VERSION-$FLAVOR-debug.apk"
        fi
        
        # Move Release if exists
        RELEASE_APK=$(find opensong_tablet/app/build/outputs/apk/$FLAVOR/release -name "*.apk" 2>/dev/null | head -n 1)
        if [ -f "$RELEASE_APK" ]; then
          if [ -f "opensong_tablet/app/release-keystore.jks" ]; then
            cp "$RELEASE_APK" "artifacts_out/CryoSongbook-v$VERSION-$FLAVOR-release-signed.apk"
          else
            cp "$RELEASE_APK" "artifacts_out/CryoSongbook-v$VERSION-$FLAVOR-release-unsigned.apk"
          fi
        fi

    - name: Upload Debug Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: CryoSongbook-${{ matrix.flavor }}-v${{ steps.get_version.outputs.VERSION }}-debug
        path: artifacts_out/*debug.apk

    - name: Upload Build Log (on tag)
      if: always() && startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: Gradle-Build-Log-${{ matrix.flavor }}
        path: build_log_${{ matrix.flavor }}.txt
        retention-days: 3

    - name: Upload Release Artifacts (on tag)
      if: always() && startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: CryoSongbook-${{ matrix.flavor }}-v${{ steps.get_version.outputs.VERSION }}-release
        path: artifacts_out/*release-*.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all_artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
