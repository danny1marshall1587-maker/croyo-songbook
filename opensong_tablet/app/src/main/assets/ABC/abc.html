<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
    <title>OpenSongApp ABC Notation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="abcjs-basic-min.js" type="text/javascript"></script>
    <style>
* {
  box-sizing: border-box;
}
:root {
  --main-color: #000000;
  --main-chord-color: #000000;
  --main-size-width: 1px;
  --main-size-height: 1px;
  --main-font-size: 18pt;
}

svg {
    fill: var(--main-color);
    stroke: var(--main-color);
    }

.abcjs-chord {
        fill: var(--main-chord-color);
        stroke: var(--main-chord-color);
    }

#warnings {
    font-size: var(--main-font-size);
}

#top {
    left: 0px;
    right: 0px;
    margin: 0px 0px;
    width: var(--main-size-width);
    height: 1px;
}

#abc {
  display: visible;
  width: var(--main-size-width);
  height: 1px;
  left: 0px;
  right: 0px;
  margin: 0px 0px;
  font-size: var(--main-font-size);
  outline: none;
  border: none 0px;
  overflow: scroll;
}
    </style>
    <script type="text/javascript">
        // Get the root element
        var root = document.querySelector(':root');
        var whichView = -1;
        var s = "";
        var w = 720;
        var t = 0;
        var my_hideTab = false;
        var my_instrument = "guitar";
        var s6 = "E,";
        var s5 = "A,";
        var s4 = "D";
        var s3 = "G";
        var s2 = "B";
        var s1 = "e";
        var strings_6 = true;
        var strings_5 = false;
        var strings_4 = false;
        var my_label = "Guitar";
        var maincolor = "#FFFFFF";
        var chordcolor = "#FFFFFF";
        var resp = "resize";
        var defaultoptions = {};
        var midioptions = {};
        var reported = false;
        var padding = 4;
        var isPopup = false;

        function updateABC(s) {
            var unencoded = decodeURIComponent(s);
            unencoded = unencoded.replaceAll("&apos;","'");
            unencoded = unencoded.replaceAll("__NEWLINE__","\n");
            if (document.getElementById("abc")!=null) {
                document.getElementById("abc").innerHTML = unencoded;
                initEditor();
            }
        }

        function selectionCallback(abcelem) {
            var note = {};
            for (var key in abcelem) {
                if (abcelem.hasOwnProperty(key) && key !== "abselem") {
                    note[key] = abcelem[key];
                }
            }
            var el = document.getElementById("selection");
            el.innerHTML = "<b>selectionCallback parameter:</b><br>" + JSON.stringify(note);
        }

        function setMainColor(col) {
            maincolor = col;
            root.style.setProperty('--main-color', col);
        }

        function setChordColor(col) {
            chordcolor = col;
            root.style.setProperty('--main-chord-color', col);
        }

        function setResponsive(responsive) {
            resp = responsive;
        }

        function setTranspose(halfSteps) {
            t = halfSteps;
        }

        function setHideTab(hideTab) {
            my_hideTab = hideTab;
        }

        function setInstrument(tabInstrument) {
            my_instrument = tabInstrument;
        }

        function setTuning(string6, string5, string4, string3, string2, string1) {
            s6 = string6;
            s5 = string5;
            s4 = string4;
            s3 = string3;
            s2 = string2;
            s1 = string1;
            if (string6.length===0 && string5.length===0) {
                strings_6 = false;
                strings_5 = false;
                strings_4 = true;
            } else if (string6.length===0) {
                strings_6 = false;
                strings_5 = true;
                strings_4 = false;
            } else {
                strings_6 = true;
                strings_5 = false;
                strings_4 = false;
            }
        }

        function setLabel(tabLabel) {
            my_label = tabLabel;
        }

        function setIsPopup(p) {
            isPopup = p;
        }

        function displayOnly() {
            document.getElementById("bottom").style.display = "none";
            document.getElementById("warnings").style.display = "none";
            document.getElementById("abc").style.display = "none";
        }

        function displayAndEdit() {
            document.getElementById("bottom").style.display = "block";
            document.getElementById("warnings").style.display = "block";
            document.getElementById("abc").style.display = "none";
        }

        function setWidth(wd) {
            w = wd;
            document.getElementById("top").style.width = (wd)+"px";
            document.getElementById("abc").style.width = (wd)+"px";
            document.querySelector(':root').style.setProperty('--main-size-width', (wd)+"px");
        }

        function setWebView(whichWebView) {
            whichView = whichWebView;
        }

        var ro = new ResizeObserver( entries => {
            for (let entry of entries) {
                var width = entry.contentRect.width;
                var height = entry.contentRect.height;
                if (height>1 && !reported) {
                    reported = true;
                    console.log("sending returnSize non secondary");
                    AndroidApp.returnSize(whichView,width,height+padding,document.getElementById("paper").innerHTML,isPopup);
                }
            }
        });

        function getMyScrollHeight() {
            reported = false;
            ro.observe(document.getElementById('paper'));
        }

        function updateOptions() {
            defaultoptions = {paddingtop:0, paddingbottom:padding, paddingright:0, paddingleft:0,
                                    staffwidth: w, add_classes:true, responsive: 'resize',
                                    foregroundColor: maincolor,
                                    viewportHorizontal: true, viewportVertical: true,
                                    scrollHorizontal:false, scrollVertical:false,
                                    visualTranspose: t,
                                    format:{tablabelfont: "Arial 10", gchordfont: "Arial 12"}};
            midioptions = {generate_midi: false, midi_id:"midi", midi_download_id: "midi-download",
                    generate_warnings: true, warnings_id:"warnings",
                    midi_options: {generateDownload: false},
                    render_options: {listener: {highlight: selectionCallback}}};
        }

        function initEditor() {
            console.log("initEditor() running");
            updateOptions();
            getMyScrollHeight();
            if (my_hideTab==true) {
                // We just want the score
                new ABCJS.Editor("abc", {paper_id: "paper", warnings_id:"warnings", abcjsParams: defaultoptions, midioptions});
            } else {
                // Decide how many strings we are using
                var taboptions;
                if (strings_6===true) {
                    taboptions = {tablature: [{instrument: my_instrument, label: my_label,
                                    tuning: [s6,s5,s4,s3,s2,s1]}]};
                } else if (strings_5===true) {
                    taboptions = {tablature: [{instrument: my_instrument, label: my_label,
                                    tuning: [s5,s4,s3,s2,s1]}]};
                } else {
                    taboptions = {tablature: [{instrument: my_instrument, label: my_label,
                                    tuning: [s4,s3,s2,s1]}]};
                }
                var myoptions = {...defaultoptions, ...taboptions};
                new ABCJS.Editor("abc", {paper_id: "paper", warnings_id:"warnings", abcjsParams: myoptions, midioptions});
            }

            // Update the colours to match our preferences
            document.getElementById("paper").querySelectorAll('.abcjs-chord').forEach((el) => {
                if (el.getAttribute("fill")) {
                    el.setAttribute("fill", maincolor);
                }
                if (el.getAttribute("stroke")) {
                    el.setAttribute("stroke", maincolor);
                }
            });
        }
    </script>
</head>
<body>
<div id="top">
    <div id="paper"></div>
    <div id="warnings" style="color:#ffffff; background-color:#ff0000; display:none;"></div>
</div>
<p>
<div id="bottom" style="display:hidden">
    <textarea name="abc" id="abc" rows="16" oninput="checkKey()"></textarea>
</div>
</body>
</html>
